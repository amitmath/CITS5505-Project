<header class="topbar d-flex justify-content-between align-items-center">
  <div class="d-flex align-items-center gap-4 flex-wrap">
    {% if topbar_title %}
    <h3 class="page-title mb-0">{{ topbar_title }}</h3>
    {% endif %}

    <div class="search-box {{ topbar_search_class | default('') }}">
      <i class="bi bi-search"></i>
      <input
        type="text"
        class="form-control"
        placeholder="{{ topbar_search_placeholder | default('Search...') }}"
      />
    </div>
  </div>

  <div class="topbar-right d-flex align-items-center gap-3">
    {% if topbar_action_label %}
    <button
      class="btn {{ topbar_action_class | default('primary-action-btn') }}"
      {% if topbar_action_modal_id %}
      type="button"
      data-bs-toggle="modal"
      data-bs-target="#{{ topbar_action_modal_id }}"
      {% endif %}
    >
      {{ topbar_action_label }}
    </button>
    {% endif %}
    <i class="bi bi-bell"></i>
    <i class="bi bi-gear"></i>

    <div class="profile-box d-flex align-items-center gap-2">
      <div>
        <p class="profile-name mb-0">{{ profile_name | default(g.user.full_name if g.user else 'Amit') }}</p>
        <a href="{{ url_for('logout') }}" class="profile-link">LOG OUT</a>
      </div>
      <div class="profile-avatar d-flex align-items-center justify-content-center rounded-circle"
        style="width:36px;height:36px;background:#1D9E75;font-size:0.9rem;color:white;font-weight:600;overflow:hidden;">
        {% if g.user and g.user.avatar_url %}
            <img src="{{ g.user.avatar_url }}" alt="avatar" style="width:100%;height:100%;object-fit:cover;">
        {% elif g.user %}
            {{ g.user.full_name[0].upper() }}
        {% endif %}
      </div>
    </div>
  </div>
</header>
